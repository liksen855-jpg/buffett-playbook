      href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"

  </head>
  <body>
    <div id="root"></div>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
  (function() {
    const HASH = '#/work-with-me';
    const FORM_URL = 'https://forms.gle/L5FNXooCBDAZgjSk8';

    function injectStyles() {
      const s = document.createElement('style');
      s.textContent = `
        #wwm-overlay {
          display: none; position: fixed; inset: 0; z-index: 9999;
          overflow-y: auto; overflow-x: hidden;
          background-color: hsl(var(--background, 220 20% 97%));
          color: hsl(var(--foreground, 220 20% 8%));
          --wm: 'IBM Plex Mono', monospace;
          --wd: 'Syne', sans-serif;
          --wa: hsl(188 55% 32%);
          --wr: rgba(128,128,128,.12);
          --wu: rgba(128,128,128,.46);
        }
        #wwm-overlay.active { display: block; }
        body:has(#wwm-overlay.active) #root { visibility: hidden; }

        .w-page {
          min-height: 100vh; max-width: 760px; margin: 0 auto;
          padding: 0 2.5rem; display: flex; flex-direction: column;
        }
        .w-topbar {
          display: flex; align-items: center; justify-content: space-between;
          padding: 1.5rem 0; border-bottom: 1px solid var(--wr);
        }
        .w-back {
          display: inline-flex; align-items: center; gap: 7px;
          font-family: var(--wm); font-size: 11px; letter-spacing: .04em;
          color: var(--wu); cursor: pointer; background: none; border: none;
          padding: 0; transition: color .18s;
        }
        .w-back:hover { color: var(--wa); }
        .w-back svg { transition: transform .18s; }
        .w-back:hover svg { transform: translateX(-3px); }
        .w-brand { font-family: var(--wm); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--wu); }

        .w-hero { padding: 5.5rem 0 4rem; }
        .w-kicker {
          font-family: var(--wm); font-size: 10.5px; letter-spacing: .18em;
          text-transform: uppercase; color: var(--wa);
          display: flex; align-items: center; gap: 10px; margin-bottom: 2rem;
        }
        .w-kicker::before { content: ''; width: 24px; height: 1px; background: var(--wa); display: block; }
        .w-headline {
          font-family: var(--wd); font-size: clamp(2.4rem, 5.5vw, 3.8rem);
          font-weight: 700; line-height: 1.05; letter-spacing: -.03em; margin-bottom: 2rem;
        }
        .w-headline em { font-style: normal; color: var(--wa); }
        .w-body {
          font-family: var(--wd); font-size: 1.05rem; font-weight: 400;
          line-height: 1.72; color: var(--wu); max-width: 500px;
        }

        .w-services { border-top: 1px solid var(--wr); padding: 3.5rem 0; }
        .w-services-label {
          font-family: var(--wm); font-size: 10px; letter-spacing: .14em;
          text-transform: uppercase; color: var(--wu); margin-bottom: 1.8rem;
        }
        .w-row {
          display: flex; align-items: baseline; gap: 1.5rem;
          padding: 1rem 0; border-bottom: 1px solid var(--wr);
          transition: padding-left .2s; cursor: default;
        }
        .w-row:first-of-type { border-top: 1px solid var(--wr); }
        .w-row:hover { padding-left: 8px; }
        .w-num { font-family: var(--wm); font-size: 10px; color: var(--wu); min-width: 20px; }
        .w-name { font-family: var(--wd); font-size: .95rem; font-weight: 600; letter-spacing: -.01em; flex: 1; }
        .w-desc { font-family: var(--wm); font-size: 11px; color: var(--wu); text-align: right; max-width: 210px; line-height: 1.5; }

        .w-cta {
          border-top: 1px solid var(--wr); padding: 4rem 0 5.5rem;
          display: flex; align-items: flex-end;
          justify-content: space-between; gap: 2rem; flex-wrap: wrap;
          margin-top: auto;
        }
        .w-cta-text {
          font-family: var(--wd); font-size: clamp(1.3rem, 3vw, 1.9rem);
          font-weight: 600; line-height: 1.25; letter-spacing: -.02em;
        }
        .w-cta-text span { color: var(--wu); font-weight: 400; }
        .w-btn {
          display: inline-flex; align-items: center; gap: 9px;
          padding: 13px 26px; background: var(--wa); color: #fff;
          font-family: var(--wd); font-size: .875rem; font-weight: 600;
          border: none; border-radius: 4px; cursor: pointer;
          text-decoration: none; white-space: nowrap;
          transition: opacity .2s, transform .15s;
        }
        .w-btn:hover { opacity: .88; transform: translateY(-2px); }
        .w-btn:active { transform: translateY(0); }

        @keyframes w-up {
          from { opacity: 0; transform: translateY(14px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .w-topbar { animation: w-up .4s cubic-bezier(.22,.68,0,1.05) .04s both; }
        .w-hero    { animation: w-up .4s cubic-bezier(.22,.68,0,1.05) .10s both; }
        .w-services{ animation: w-up .4s cubic-bezier(.22,.68,0,1.05) .17s both; }
        .w-cta     { animation: w-up .4s cubic-bezier(.22,.68,0,1.05) .24s both; }

        #wwm-nav-item { list-style: none; }
        #wwm-nav-btn {
          display: flex; align-items: center; gap: 8px; width: 100%;
          padding: 8px; border-radius: 6px; font-size: .875rem;
          cursor: pointer; border: none; background: none; color: inherit;
          transition: background .15s; text-align: left;
        }
        #wwm-nav-btn:hover,
        #wwm-nav-btn.active { background: var(--sidebar-accent, rgba(128,128,128,.12)); }
        #wwm-nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
      `;
      document.head.appendChild(s);
    }

    function buildOverlay() {
      const div = document.createElement('div');
      div.id = 'wwm-overlay';
      div.innerHTML = `
        <div class="w-page">
          <div class="w-topbar">
            <button class="w-back" id="w-back">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              Dashboard
            </button>
            <span class="w-brand">MECON</span>
          </div>

          <div class="w-hero">
            <p class="w-kicker">Collaboration</p>
            <h1 class="w-headline">If you think we<br>can build something<br><em>together</em> —</h1>
            <p class="w-body">Workshops, consulting, macro analysis, research reports, data products.<br>If there's a fit, I'd like to hear about it.</p>
          </div>

          <div class="w-services">
            <p class="w-services-label">What I work on</p>
            <div class="w-row"><span class="w-num">01</span><span class="w-name">Macro &amp; Sector Analysis</span><span class="w-desc">GDP, trade, inflation — Malaysia &amp; Southeast Asia</span></div>
            <div class="w-row"><span class="w-num">02</span><span class="w-name">Research Reports</span><span class="w-desc">Investor briefs, policy notes, economic outlooks</span></div>
            <div class="w-row"><span class="w-num">03</span><span class="w-name">Consulting</span><span class="w-desc">Strategy, market entry, data advisory</span></div>
            <div class="w-row"><span class="w-num">04</span><span class="w-name">Workshops &amp; Training</span><span class="w-desc">Economic literacy, indicator frameworks</span></div>
            <div class="w-row"><span class="w-num">05</span><span class="w-name">Data Products</span><span class="w-desc">Custom dashboards, analytics tools</span></div>
          </div>

          <div class="w-cta">
            <p class="w-cta-text">Let's figure out<br><span>if there's a fit.</span></p>
            <a class="w-btn" href="${FORM_URL}" target="_blank" rel="noopener">
              Get in touch
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
          </div>
        </div>`;
      document.body.appendChild(div);
      div.querySelector('#w-back').onclick = () => { window.location.hash = '#/'; };
    }

    function showOverlay() {
      const el = document.getElementById('wwm-overlay');
      if (!el) return;
      el.classList.add('active');
      el.scrollTop = 0;
      // re-trigger staggered animations
      const targets = el.querySelectorAll('.w-topbar,.w-hero,.w-services,.w-cta');
      targets.forEach(n => { n.style.animation = 'none'; n.offsetHeight; n.style.animation = ''; });
    }

    function hideOverlay() {
      const el = document.getElementById('wwm-overlay');
      if (el) el.classList.remove('active');
    }

    function injectNavItem() {
      const lists = document.querySelectorAll('[data-sidebar="menu"]');
      if (!lists.length || document.getElementById('wwm-nav-item')) return;
      const li = document.createElement('li');
      li.id = 'wwm-nav-item';
      li.innerHTML = `
        <button id="wwm-nav-btn" title="Work with Me">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Work with Me</span>
        </button>`;
      li.querySelector('#wwm-nav-btn').onclick = () => { window.location.hash = HASH; };
      lists[lists.length - 1].appendChild(li);
    }

    function onHashChange() {
      const active = window.location.hash === HASH;
      active ? showOverlay() : hideOverlay();
      const btn = document.getElementById('wwm-nav-btn');
      if (btn) btn.classList.toggle('active', active);
    }

    function init() {
      injectStyles();
      buildOverlay();
      let tries = 0;
      const t = setInterval(() => {
        injectNavItem();
        if (document.getElementById('wwm-nav-item') || ++tries > 40) clearInterval(t);
      }, 250);
      window.addEventListener('hashchange', onHashChange);
      onHashChange();
    }

    document.readyState === 'loading'
      ? document.addEventListener('DOMContentLoaded', init)
      : setTimeout(init, 100);
  })();
  </script>

  <script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
