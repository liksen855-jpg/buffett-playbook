  </head>
  <body>
    <div id="root"></div>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
  (function() {
    const HASH = '#/work-with-me';
    const FORM_URL = 'https://forms.gle/L5FNXooCBDAZgjSk8';

    function injectStyles() {
      const style = document.createElement('style');
      style.textContent = `
        /* ── overlay shell ── */
        #wwm-overlay {
          display: none;
          position: fixed;
          inset: 0;
          z-index: 9999;
          overflow-y: auto;
          overflow-x: hidden;
          background-color: hsl(var(--background, 220 20% 97%));
          color: hsl(var(--foreground, 220 20% 8%));
          --wwm-mono: 'IBM Plex Mono', monospace;
          --wwm-display: 'Syne', sans-serif;
          --wwm-accent: hsl(188 55% 32%);
          --wwm-rule: rgba(128,128,128,.13);
          --wwm-muted: rgba(128,128,128,.5);
        }
        #wwm-overlay.active { display: block; }
        body:has(#wwm-overlay.active) #root { visibility: hidden; }

        /* ── layout ── */
        .wwm-page {
          min-height: 100vh;
          display: grid;
          grid-template-rows: auto 1fr auto;
          max-width: 780px;
          margin: 0 auto;
          padding: 0 2.5rem;
        }

        /* ── top bar ── */
        .wwm-topbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 1.75rem 0 1.75rem;
          border-bottom: 1px solid var(--wwm-rule);
        }
        .wwm-back {
          display: inline-flex;
          align-items: center;
          gap: 7px;
          font-family: var(--wwm-mono);
          font-size: 11px;
          letter-spacing: .04em;
          color: var(--wwm-muted);
          cursor: pointer;
          background: none;
          border: none;
          padding: 0;
          transition: color .2s;
        }
        .wwm-back:hover { color: var(--wwm-accent); }
        .wwm-back svg { transition: transform .2s; }
        .wwm-back:hover svg { transform: translateX(-3px); }
        .wwm-topbar-label {
          font-family: var(--wwm-mono);
          font-size: 10px;
          letter-spacing: .12em;
          text-transform: uppercase;
          color: var(--wwm-muted);
        }

        /* ── hero ── */
        .wwm-hero {
          padding: 5rem 0 4.5rem;
        }
        .wwm-kicker {
          font-family: var(--wwm-mono);
          font-size: 11px;
          letter-spacing: .16em;
          text-transform: uppercase;
          color: var(--wwm-accent);
          margin-bottom: 2rem;
          display: flex;
          align-items: center;
          gap: 10px;
        }
        .wwm-kicker::before {
          content: '';
          display: block;
          width: 28px;
          height: 1px;
          background: var(--wwm-accent);
        }
        .wwm-headline {
          font-family: var(--wwm-display);
          font-size: clamp(2.6rem, 6vw, 4.2rem);
          font-weight: 700;
          line-height: 1.0;
          letter-spacing: -.03em;
          margin-bottom: 2.5rem;
        }
        .wwm-headline em {
          font-style: normal;
          color: var(--wwm-accent);
        }
        .wwm-body {
          font-family: var(--wwm-display);
          font-size: 1.1rem;
          font-weight: 400;
          line-height: 1.72;
          color: var(--wwm-muted);
          max-width: 520px;
          margin-bottom: 0;
        }

        /* ── services list ── */
        .wwm-services {
          border-top: 1px solid var(--wwm-rule);
          padding: 3.5rem 0;
        }
        .wwm-services-label {
          font-family: var(--wwm-mono);
          font-size: 10px;
          letter-spacing: .14em;
          text-transform: uppercase;
          color: var(--wwm-muted);
          margin-bottom: 2rem;
        }
        .wwm-service-row {
          display: flex;
          align-items: baseline;
          gap: 1.5rem;
          padding: 1.1rem 0;
          border-bottom: 1px solid var(--wwm-rule);
          cursor: default;
          transition: padding-left .2s;
        }
        .wwm-service-row:first-of-type { border-top: 1px solid var(--wwm-rule); }
        .wwm-service-row:hover { padding-left: 6px; }
        .wwm-service-num {
          font-family: var(--wwm-mono);
          font-size: 10px;
          color: var(--wwm-muted);
          min-width: 20px;
          padding-top: 2px;
        }
        .wwm-service-name {
          font-family: var(--wwm-display);
          font-size: 1rem;
          font-weight: 600;
          letter-spacing: -.01em;
          flex: 1;
        }
        .wwm-service-desc {
          font-family: var(--wwm-mono);
          font-size: 11px;
          color: var(--wwm-muted);
          text-align: right;
          max-width: 220px;
          line-height: 1.5;
        }

        /* ── cta block ── */
        .wwm-cta-section {
          border-top: 1px solid var(--wwm-rule);
          padding: 4rem 0 6rem;
          display: flex;
          align-items: flex-end;
          justify-content: space-between;
          gap: 3rem;
          flex-wrap: wrap;
        }
        .wwm-cta-text {
          font-family: var(--wwm-display);
          font-size: clamp(1.4rem, 3.5vw, 2rem);
          font-weight: 600;
          line-height: 1.25;
          letter-spacing: -.02em;
          max-width: 340px;
        }
        .wwm-cta-text span {
          color: var(--wwm-muted);
          font-weight: 400;
        }
        .wwm-btn {
          display: inline-flex;
          align-items: center;
          gap: 10px;
          padding: 14px 28px;
          background: var(--wwm-accent);
          color: #fff;
          font-family: var(--wwm-display);
          font-size: .875rem;
          font-weight: 600;
          letter-spacing: .01em;
          border-radius: 4px;
          text-decoration: none;
          white-space: nowrap;
          border: none;
          cursor: pointer;
          transition: opacity .2s, transform .15s;
          position: relative;
          overflow: hidden;
        }
        .wwm-btn::after {
          content: '';
          position: absolute;
          inset: 0;
          background: rgba(255,255,255,.08);
          opacity: 0;
          transition: opacity .2s;
        }
        .wwm-btn:hover { transform: translateY(-2px); opacity: .92; }
        .wwm-btn:hover::after { opacity: 1; }
        .wwm-btn:active { transform: translateY(0); }
        .wwm-btn svg { flex-shrink: 0; }

        /* ── footer note ── */
        .wwm-footnote {
          font-family: var(--wwm-mono);
          font-size: 10px;
          color: var(--wwm-muted);
          padding-bottom: 2rem;
          opacity: .6;
        }

        /* ── animations ── */
        @keyframes wwm-slide {
          from { opacity: 0; transform: translateY(14px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .wwm-anim { animation: wwm-slide .5s cubic-bezier(.22,.68,0,1.1) both; }
        .wwm-d0  { animation-delay: .05s; }
        .wwm-d1  { animation-delay: .12s; }
        .wwm-d2  { animation-delay: .19s; }
        .wwm-d3  { animation-delay: .26s; }
        .wwm-d4  { animation-delay: .33s; }
        .wwm-d5  { animation-delay: .38s; }

        /* ── sidebar nav item ── */
        #wwm-nav-item { list-style: none; }
        #wwm-nav-btn {
          display: flex;
          align-items: center;
          gap: 8px;
          width: 100%;
          padding: 8px;
          border-radius: 6px;
          font-size: .875rem;
          cursor: pointer;
          border: none;
          background: none;
          color: inherit;
          transition: background .15s;
          text-align: left;
        }
        #wwm-nav-btn:hover,
        #wwm-nav-btn.active { background: var(--sidebar-accent, rgba(128,128,128,.12)); }
        #wwm-nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
      `;
      document.head.appendChild(style);
    }

    function buildOverlay() {
      const div = document.createElement('div');
      div.id = 'wwm-overlay';
      div.innerHTML = `
        <div class="wwm-page">

          <div class="wwm-topbar wwm-anim wwm-d0">
            <button class="wwm-back">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              Dashboard
            </button>
            <span class="wwm-topbar-label">MECON</span>
          </div>

          <div class="wwm-hero">
            <p class="wwm-kicker wwm-anim wwm-d1">Collaboration</p>
            <h1 class="wwm-headline wwm-anim wwm-d2">If you think we<br>can build something<br><em>together</em> —</h1>
            <p class="wwm-body wwm-anim wwm-d3">
              Workshops, consulting, macro analysis, research reports, data products.
              If there's a fit, I'd like to hear about it.
            </p>
          </div>

          <div class="wwm-services wwm-anim wwm-d3">
            <p class="wwm-services-label">What I work on</p>

            <div class="wwm-service-row">
              <span class="wwm-service-num">01</span>
              <span class="wwm-service-name">Macro &amp; Sector Analysis</span>
              <span class="wwm-service-desc">GDP, trade, inflation, sector deep-dives — Malaysia &amp; Southeast Asia</span>
            </div>
            <div class="wwm-service-row">
              <span class="wwm-service-num">02</span>
              <span class="wwm-service-name">Research Reports</span>
              <span class="wwm-service-desc">Investor briefs, policy notes, economic outlooks</span>
            </div>
            <div class="wwm-service-row">
              <span class="wwm-service-num">03</span>
              <span class="wwm-service-name">Consulting</span>
              <span class="wwm-service-desc">Strategy, market entry, data architecture</span>
            </div>
            <div class="wwm-service-row">
              <span class="wwm-service-num">04</span>
              <span class="wwm-service-name">Workshops &amp; Training</span>
              <span class="wwm-service-desc">Economic literacy, data interpretation, indicator frameworks</span>
            </div>
            <div class="wwm-service-row">
              <span class="wwm-service-num">05</span>
              <span class="wwm-service-name">Data Products</span>
              <span class="wwm-service-desc">Custom dashboards, analytics tools, live data pipelines</span>
            </div>
          </div>

          <div class="wwm-cta-section wwm-anim wwm-d4">
            <p class="wwm-cta-text">
              Let's figure out<br>
              <span>if there's a fit.</span>
            </p>
            <a class="wwm-btn" href="${FORM_URL}" target="_blank" rel="noopener">
              Get in touch
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
          </div>

          <p class="wwm-footnote wwm-anim wwm-d5">
            Malaysia · ${new Date().getFullYear()}
          </p>

        </div>
      `;
      document.body.appendChild(div);
      div.querySelector('.wwm-back').onclick = () => { window.location.hash = '#/'; };
    }

    function showOverlay() {
      const el = document.getElementById('wwm-overlay');
      if (!el) return;
      // Re-trigger animations by rebuilding inner content
      const page = el.querySelector('.wwm-page');
      if (page) {
        const anims = page.querySelectorAll('.wwm-anim');
        anims.forEach(n => { n.style.animation = 'none'; n.offsetHeight; n.style.animation = ''; });
      }
      el.classList.add('active');
      el.scrollTop = 0;
    }

    function hideOverlay() {
      const el = document.getElementById('wwm-overlay');
      if (el) el.classList.remove('active');
    }

    function injectNavItem() {
      const allLists = document.querySelectorAll('[data-sidebar="menu"]');
      if (!allLists.length || document.getElementById('wwm-nav-item')) return;
      const target = allLists[allLists.length - 1];
      const li = document.createElement('li');
      li.id = 'wwm-nav-item';
      li.innerHTML = `
        <button id="wwm-nav-btn" title="Work with Me">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Work with Me</span>
        </button>
      `;
      li.querySelector('#wwm-nav-btn').onclick = () => { window.location.hash = HASH; };
      target.appendChild(li);
    }

    function onHashChange() {
      const active = window.location.hash === HASH;
      active ? showOverlay() : hideOverlay();
      const btn = document.getElementById('wwm-nav-btn');
      if (btn) btn.classList.toggle('active', active);
    }

    function init() {
      injectStyles();
      buildOverlay();
      let tries = 0;
      const tryNav = setInterval(() => {
        injectNavItem();
        if (document.getElementById('wwm-nav-item') || ++tries > 40) clearInterval(tryNav);
      }, 250);
      window.addEventListener('hashchange', onHashChange);
      onHashChange();
    }

    document.readyState === 'loading'
      ? document.addEventListener('DOMContentLoaded', init)
      : setTimeout(init, 100);
  })();
  </script>

  <script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
