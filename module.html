.module-breadcrumb {

  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--white-dim);

}
.module-breadcrumb a { color: var(--white-dim); text-decoration: none; }
.module-breadcrumb a:hover { color: var(--gold); }
.module-breadcrumb .sep { color: var(--border); }
.module-header-grid {
  display: grid; grid-template-columns: 1fr 340px;
  gap: 4rem; align-items: start;
}
.module-number {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  color: var(--gold);
  margin-bottom: 1rem;
}
.module-title {
  font-family: var(--font-display);
  font-size: clamp(2.2rem, 4vw, 3.5rem);
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 1.5rem;
}
.module-desc { font-size: 1.05rem; color: var(--white-dim); line-height: 1.8; margin-bottom: 2rem; }
.module-meta-row {
  display: flex; align-items: center; gap: 2rem;
  padding: 1.25rem 0;
  border-top: 1px solid var(--border-lt);
  border-bottom: 1px solid var(--border-lt);
}
.meta-item { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em; }
.meta-item strong { color: var(--gold); display: block; font-size: 0.7rem; margin-bottom: 0.2rem; }
.meta-formats { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 1.5rem; }

/* SIDEBAR */
.module-sidebar {
  background: var(--navy-mid);
  border: 1px solid var(--border-lt);
  border-radius: 4px;
  padding: 1.75rem;
  position: sticky; top: 90px;
}
.sidebar-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.25rem;
}
.lesson-list { list-style: none; }
.lesson-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.65rem 0;
  border-bottom: 1px solid var(--border-lt);
  font-size: 0.82rem;
  color: var(--white-dim);
  cursor: none;
  transition: color 0.2s;
}
.lesson-item:hover { color: var(--white); }
.lesson-item:last-child { border-bottom: none; }
.lesson-num {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--gold);
  min-width: 20px;
}
.lesson-check {
  width: 16px; height: 16px;
  border: 1px solid var(--border-lt);
  border-radius: 2px;
  flex-shrink: 0;
  margin-left: auto;
}
.lesson-check.done { background: var(--gold); border-color: var(--gold); }
.sidebar-progress { margin-top: 1.5rem; }
.sidebar-progress-label {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--white-dim);
  margin-bottom: 0.5rem;
}

.module-content { padding: 5rem 0; }
.content-grid {

.module-section { margin-bottom: 4rem; }
.section-label {

  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);

  display: flex; align-items: center; gap: 0.75rem;

.section-label::after { content:''; flex: 1; height: 1px; background: var(--border-lt); }

/* Video embed placeholder */
.video-placeholder {
  aspect-ratio: 16/9;
  background: var(--navy-mid);
  border: 1px solid var(--border-lt);
  border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1rem;
  margin-bottom: 2rem;
  cursor: none;
  transition: border-color 0.3s;
  position: relative; overflow: hidden;
}
.video-placeholder:hover { border-color: var(--border); }
.video-placeholder::before {
  content: '';

}
.play-btn {

  font-size: 1.4rem;
  color: var(--gold);
  transition: all 0.3s;
  animation: pulse-gold 2s infinite;
  position: relative; z-index: 1;

/* Key concepts */
.concept-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
.concept-card {
  background: var(--navy);
  border: 1px solid var(--border-lt);

  padding: 1.25rem;

.concept-card p { font-size: 0.78rem; color: var(--white-dim); line-height: 1.5; }

/* Lessons */
.lesson-content { margin-top: 2rem; }
.lesson-block {
  background: var(--navy-mid);
  border: 1px solid var(--border-lt);
  border-radius: 4px;
  margin-bottom: 1rem;
  overflow: hidden;

  cursor: none;
  transition: background 0.2s;

.lesson-block-header:hover { background: rgba(200,168,75,0.04); }
.lesson-block-num {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  color: var(--gold);
  min-width: 24px;

.lesson-block-title { font-size: 0.9rem; font-weight: 600; color: var(--white); flex: 1; }
.lesson-block-time {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--white-dim);
}
.lesson-block-formats { display: flex; gap: 0.3rem; }

/* Case study highlight */
.case-study-box {
  background: var(--navy);
  border: 1px solid rgba(200,168,75,0.3);
  border-left: 3px solid var(--gold);
  border-radius: 4px;
  padding: 1.75rem 2rem;
  margin: 2rem 0;
}
.case-study-box .ui-label { margin-bottom: 0.75rem; }
.case-study-box h4 { font-family: var(--font-display); font-size: 1.15rem; margin-bottom: 0.5rem; }
.case-study-box p { font-size: 0.88rem; color: var(--white-dim); line-height: 1.65; }

/* Quiz preview */
.quiz-preview {
  background: var(--navy-mid);
  border: 1px solid var(--border-lt);
  border-radius: 4px;
  padding: 1.75rem;
  margin-top: 2rem;
}
.quiz-preview h4 { font-family: var(--font-display); font-size: 1rem; margin-bottom: 1rem; }
.quiz-option {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.65rem 1rem;
  border: 1px solid var(--border-lt);
  border-radius: 2px;
  margin-bottom: 0.5rem;
  font-size: 0.85rem;
  color: var(--white-dim);
  cursor: none;
  transition: all 0.2s;

.quiz-option:hover { border-color: var(--gold); color: var(--white); background: var(--gold-dim); }
.quiz-option.correct { border-color: #4CAF80; background: rgba(76,175,128,0.1); color: #4CAF80; }
.quiz-option.wrong { border-color: #E07070; background: rgba(224,112,112,0.1); color: #E07070; }

/* Nav between modules */
.module-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 2rem 0;
  border-top: 1px solid var(--border-lt);
  margin-top: 3rem;
}
.module-nav-prev, .module-nav-next {
  display: flex; flex-direction: column; gap: 0.3rem;
  font-size: 0.85rem;
  text-decoration: none;
  color: var(--white-dim);
  transition: color 0.2s;
  max-width: 240px;
}
.module-nav-prev:hover, .module-nav-next:hover { color: var(--white); }
.module-nav-next { text-align: right; align-items: flex-end; }
.module-nav span {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--gold);
}
.module-nav strong { font-family: var(--font-display); font-size: 1rem; }

@media (max-width: 1024px) {
  .module-header-grid, .content-grid { grid-template-columns: 1fr; }
  .module-sidebar { position: static; }
}
</style>

        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
          <span class="tier-badge tier-${mod.tier}">Tier ${mod.tier} · ${['Foundation','Investor','Operator','Strategist'][mod.tier-1]}</span>
          <span class="module-number">MODULE ${mod.code}</span>
        </div>
        <h1 class="module-title">${mod.title}</h1>
        <p class="module-desc">${mod.desc}</p>
        <div class="module-meta-row">
          <div class="meta-item"><strong>TIME</strong>${mod.time}</div>
          <div class="meta-item"><strong>LESSONS</strong>${content.lessons.length} lessons</div>
          <div class="meta-item"><strong>TIER</strong>${mod.tier} of 4</div>
        </div>
        <div class="meta-formats">
          ${mod.formats.map(f=>`<span class="format-tag">${formatIcon(f)} ${f}</span>`).join('')}
        </div>
        <div style="margin-top:2rem;display:flex;gap:1rem;">
          <a href="#content" class="btn btn-primary">Start Module →</a>
          <a href="/learn/" class="btn btn-ghost">Back to All Modules</a>
        </div>
      </div>

      <div class="module-sidebar animate-fade-up delay-2">
        <div class="sidebar-title">Lesson List</div>
        <ul class="lesson-list">
          ${content.lessons.map((l,i)=>`
          <li class="lesson-item">
            <span class="lesson-num">${String(i+1).padStart(2,'0')}</span>
            <span>${l.title}</span>
            <div class="lesson-check"></div>
          </li>`).join('')}
        </ul>
        <div class="sidebar-progress">
          <div class="sidebar-progress-label"><span>Progress</span><span>0/${content.lessons.length}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
        </div>
        ${mod.prereqs.length > 0 ? `
        <div style="margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border-lt);">
          <div class="ui-label" style="margin-bottom:0.75rem;">Prerequisites</div>
          ${mod.prereqs.map(p=>{const pm=MODULES.find(m=>m.id===p);return pm?`<div style="font-size:0.78rem;color:var(--white-dim);padding:0.3rem 0;">Module ${pm.code}: ${pm.title}</div>`:''}).join('')}
        </div>` : ''}
      </div>
    </div>
  </div>
</section>

<!-- MODULE CONTENT -->
<section class="module-content" id="content">
  <div class="container">
    <div class="content-grid">
      <div>
        <!-- VIDEO -->
        <div class="module-section">
          <div class="section-label">Main Lesson</div>
          <div class="video-placeholder" onclick="this.innerHTML='<iframe width=100% height=100% src=https://www.youtube.com/embed/dQw4w9WgXcQ style=border:none;border-radius:4px; allowfullscreen></iframe>';this.style.padding=0;">
            <div class="play-btn">▶</div>
            <div class="video-label">Module ${mod.code} — ${mod.title} · ${mod.time}</div>
          </div>
        </div>

        <!-- KEY CONCEPTS -->
        <div class="module-section">
          <div class="section-label">Key Concepts</div>
          <div class="concept-cards">
            ${content.keyConcepts.map(c=>`
            <div class="concept-card">
              <div class="concept-card-icon">${c.icon}</div>
              <h5>${c.title}</h5>
              <p>${c.desc}</p>
            </div>`).join('')}
          </div>
        </div>

        <!-- LESSONS -->
        <div class="module-section">
          <div class="section-label">All Lessons</div>
          <div class="lesson-content">
            ${content.lessons.map((l,i)=>`
            <div class="lesson-block">
              <div class="lesson-block-header" onclick="this.nextElementSibling && this.nextElementSibling.classList.toggle('hidden')">
                <span class="lesson-block-num">${String(i+1).padStart(2,'0')}</span>
                <span class="lesson-block-title">${l.title}</span>
                <div class="lesson-block-formats">
                  ${l.formats.map(f=>`<span class="format-tag">${formatIcon(f)}</span>`).join('')}
                </div>
                <span class="lesson-block-time">${l.time}</span>
              </div>
            </div>`).join('')}
          </div>
        </div>

        ${content.caseStudy ? `
        <!-- CASE STUDY -->
        <div class="module-section">
          <div class="section-label">Case Study</div>
          <div class="case-study-box">
            <div class="ui-label">Real-World Application</div>
            <h4>${content.caseStudy.title}</h4>
            <p>${content.caseStudy.body}</p>
          </div>
        </div>` : ''}

        <!-- QUIZ -->
        <div class="module-section">
          <div class="section-label">Quick Quiz</div>
          <div class="quiz-preview">
            <h4>${content.quiz[0].q}</h4>
            ${content.quiz[0].opts.map((o,i)=>`
            <div class="quiz-option" data-idx="${i}" onclick="handleQuiz(${i})">${o}</div>`).join('')}
          </div>
        </div>

        <!-- MODULE NAVIGATION -->
        <div class="module-nav">
          ${prevMod ? `<a href="/learn/module.html?id=${prevMod.id}" class="module-nav-prev"><span>← Previous</span><strong>${prevMod.title}</strong></a>` : '<div></div>'}
          ${nextMod ? `<a href="/learn/module.html?id=${nextMod.id}" class="module-nav-next"><span>Next →</span><strong>${nextMod.title}</strong></a>` : '<div></div>'}
        </div>
      </div>

      <!-- RIGHT SIDEBAR (sticky) -->
      <div>
        <div class="module-sidebar" style="top:90px;">
          <div class="sidebar-title">Your Progress</div>
          <div style="text-align:center;padding:1.5rem 0;">
            <div style="font-family:var(--font-display);font-size:2.5rem;font-weight:700;color:var(--gold);">0%</div>
            <div style="font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.1em;color:var(--white-dim);margin-top:0.25rem;">Module complete</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
          <div style="margin-top:1.5rem;">
            <button class="btn btn-primary" style="width:100%;justify-content:center;">Mark Complete</button>
          </div>
          <div style="margin-top:1rem;">
            ${nextMod ? `<a href="/learn/module.html?id=${nextMod.id}" class="btn btn-ghost" style="width:100%;justify-content:center;">Next: Module ${nextMod.code}</a>` : ''}
          </div>
          <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border-lt);">
            <div class="ui-label" style="margin-bottom:0.75rem;">Other Tier ${mod.tier} Modules</div>
            ${MODULES.filter(m=>m.tier===mod.tier&&m.id!==id).map(m=>`
            <a href="/learn/module.html?id=${m.id}" style="display:block;font-size:0.8rem;color:var(--white-dim);text-decoration:none;padding:0.4rem 0;border-bottom:1px solid var(--border-lt);transition:color 0.2s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--white-dim)'">
              <span style="font-family:var(--font-mono);font-size:0.58rem;color:var(--gold);margin-right:0.5rem;">${m.code}</span>${m.title}
            </a>`).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="padding:2rem 0 0;border-top:1px solid var(--border-lt);">
      <span>© 2025 InsightInvest · leiholding.com</span>
      <span>Not financial advice. Educational purposes only.</span>
    </div>
  </div>
</footer>
`;

// Cursor
const cursor = document.querySelector('.cursor');
const cursorRing = document.querySelector('.cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function loop(){rx+=(mx-rx)*0.18;ry+=(my-ry)*0.18;cursor.style.left=mx+'px';cursor.style.top=my+'px';cursorRing.style.left=rx+'px';cursorRing.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,[data-hover]').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cursor.classList.add('hover');cursorRing.classList.add('hover');});
  el.addEventListener('mouseleave',()=>{cursor.classList.remove('hover');cursorRing.classList.remove('hover');});
});
const nav=document.querySelector('.nav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>40));
</script>
</body>
</html>
