<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malaysia Wage Gap</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,600,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #09090c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Satoshi', sans-serif;
  }

  .scene {
    perspective: 1400px;
    perspective-origin: 50% 45%;
    width: min(900px, 96vw);
  }

  .card {
    background: linear-gradient(150deg, #141418 0%, #0e0e12 100%);
    border: 1px solid #1e1e28;
    border-radius: 1.5rem;
    padding: 2.5rem 2.5rem 1.75rem;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.025),
      0 48px 120px rgba(0,0,0,0.75),
      inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateX(24deg) translateY(40px) scale(0.84);
    opacity: 0;
    animation: rise 1.4s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
    will-change: transform, opacity;
  }

  @keyframes rise {
    0%   { transform: rotateX(26deg) translateY(50px) scale(0.82); opacity: 0; }
    100% { transform: rotateX(0deg)  translateY(0)    scale(1);    opacity: 1; }
  }

  .legend {
    display: flex;
    gap: 1.75rem;
    margin-bottom: 1.25rem;
    opacity: 0;
    animation: up 0.6s cubic-bezier(0.16,1,0.3,1) 1.1s forwards;
  }
  .leg { display: flex; align-items: center; gap: 0.45rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #555568; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  .chart-wrap { perspective: 900px; }

  .chart-box {
    position: relative;
    height: 420px;
    opacity: 0;
    animation: up 0.9s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
    transition: transform 0.06s linear;
    will-change: transform;
  }

  .chart-box::after {
    content: '';
    position: absolute;
    inset: 10% 8%;
    background:
      radial-gradient(ellipse at 70% 40%, rgba(34,211,160,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 30% 65%, rgba(244,63,94,0.10) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
    filter: blur(16px);
  }
  canvas { position: relative; z-index: 1; }

  .src {
    margin-top: 1rem;
    font-size: 0.63rem;
    color: #28283a;
    border-top: 1px solid #18181f;
    padding-top: 0.75rem;
    opacity: 0;
    animation: up 0.5s cubic-bezier(0.16,1,0.3,1) 1.5s forwards;
  }

  @keyframes up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="card" id="card">

    <div class="legend">
      <div class="leg"><div class="dot" style="background:#22d3a0"></div>Labour Productivity</div>
      <div class="leg"><div class="dot" style="background:#f43f5e"></div>Real Wages</div>
    </div>

    <div class="chart-wrap">
      <div class="chart-box" id="chartBox">
        <canvas id="c"></canvas>
      </div>
    </div>

    <p class="src">DOSM Labour Productivity Reports · BNM Annual Report 2025</p>
  </div>
</div>

<script>
const years = [2016,2017,2018,2019,2020,2021,2022,2023,2024,2025];
const pg = [2.5,1.8,2.2,3.8,2.0,-5.5,4.0,2.4,3.4,4.9];
const wg = [2.0,1.5,2.5,2.0,1.8,-7.0,3.0,2.9,2.5,2.8];
let p=[100], w=[100];
for(let i=0;i<pg.length-1;i++){
  p.push(+(p[p.length-1]*(1+pg[i]/100)).toFixed(2));
  w.push(+(w[w.length-1]*(1+wg[i]/100)).toFixed(2));
}

// 3D tilt
const scene = document.getElementById('scene');
const box   = document.getElementById('chartBox');
let tick = false;
scene.addEventListener('mousemove', e => {
  if(tick) return; tick = true;
  requestAnimationFrame(()=>{
    const r = document.getElementById('card').getBoundingClientRect();
    const dx = (e.clientX-(r.left+r.width/2))/(r.width/2);
    const dy = (e.clientY-(r.top+r.height/2))/(r.height/2);
    box.style.transform = `rotateY(${dx*7}deg) rotateX(${-dy*4}deg)`;
    tick = false;
  });
});
scene.addEventListener('mouseleave', ()=>{
  box.style.transition = 'transform 0.8s cubic-bezier(0.16,1,0.3,1)';
  box.style.transform  = 'rotateY(0) rotateX(0)';
  setTimeout(()=>{ box.style.transition='transform 0.06s linear'; },800);
});

// Chart
const ctx2 = document.getElementById('c').getContext('2d');

const gapGrad = ctx2.createLinearGradient(0,0,0,420);
gapGrad.addColorStop(0,'rgba(244,63,94,0.32)');
gapGrad.addColorStop(0.6,'rgba(244,63,94,0.14)');
gapGrad.addColorStop(1,'rgba(244,63,94,0.01)');

const chart = new Chart(ctx2, {
  type: 'line',
  data: {
    labels: years,
    datasets: [
      {
        label: 'Labour Productivity',
        data: p,
        borderColor: '#22d3a0',
        backgroundColor: 'transparent',
        borderWidth: 3.5,
        pointBackgroundColor: '#22d3a0',
        pointBorderColor: '#0e0e12',
        pointBorderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 8,
        tension: 0.42,
        fill: false,
        order: 1
      },
      {
        label: 'Real Wages',
        data: w,
        borderColor: '#f43f5e',
        backgroundColor: gapGrad,
        borderWidth: 3.5,
        pointBackgroundColor: '#f43f5e',
        pointBorderColor: '#0e0e12',
        pointBorderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 8,
        tension: 0.42,
        fill: '-1',
        order: 2
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: {
      duration: 2600,
      easing: 'easeInOutQuart',
      onComplete(){
        chart.data.datasets.forEach(ds => ds.pointRadius = 5);
        chart.update('none');
      }
    },
    interaction: { mode:'index', intersect:false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#13131a',
        titleColor: '#ededf5',
        bodyColor: '#55556a',
        borderColor: '#1e1e28',
        borderWidth: 1,
        padding: 14,
        titleFont: { family:'Satoshi', weight:'700', size:13 },
        bodyFont: { family:'Satoshi', size:12 },
        callbacks: {
          label(c){
            const d = (c.parsed.y-100).toFixed(1);
            return `  ${c.dataset.label}: ${c.parsed.y.toFixed(1)}  (${d>=0?'+':''}${d}%)`;
          },
          afterBody(items){
            if(items.length===2){
              const g = (items[0].parsed.y-items[1].parsed.y).toFixed(1);
              return [``, `  Gap: +${g} pts`];
            }
          }
        }
      }
    },
    scales: {
      x: {
        grid: { color:'rgba(255,255,255,0.028)' },
        ticks: { color:'#2e2e40', font:{ family:'Satoshi', size:12 }, maxRotation:0 },
        border: { display:false }
      },
      y: {
        min: 88, max: 130,
        grid: { color:'rgba(255,255,255,0.028)' },
        ticks: {
          color:'#2e2e40',
          font:{ family:'Satoshi', size:11 },
          maxTicksLimit: 3,
          callback: v => v===100 ? '─ Base' : v.toFixed(0)
        },
        border: { display:false }
      }
    }
  },
  plugins: [
    {
      id:'band',
      beforeDraw({ ctx, chartArea, scales }){
        if(!chartArea) return;
        const x1=scales.x.getPixelForValue(2020);
        const x2=scales.x.getPixelForValue(2021);
        ctx.save();
        ctx.fillStyle='rgba(250,204,21,0.03)';
        ctx.fillRect(x1-12, chartArea.top, x2-x1+24, chartArea.bottom-chartArea.top);
        ctx.fillStyle='rgba(250,204,21,0.3)';
        ctx.font='600 9px Satoshi,sans-serif';
        ctx.fillText('COVID', x1-5, chartArea.top+12);
        ctx.restore();
      }
    },
    {
      id:'gapLabel',
      afterDraw({ ctx, chartArea, scales }){
        if(!chartArea) return;
        const lx  = scales.x.getPixelForValue(2025);
        const py  = scales.y.getPixelForValue(p[p.length-1]);
        const wy  = scales.y.getPixelForValue(w[w.length-1]);
        const mid = (py+wy)/2;
        const gap = (p[p.length-1]-w[w.length-1]).toFixed(1);
        ctx.save();
        // bracket
        ctx.strokeStyle='rgba(255,255,255,0.12)';
        ctx.lineWidth=1;
        ctx.setLineDash([3,3]);
        [[lx+16,py],[lx+16,wy]].forEach(([x,y])=>{ ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+10,y); ctx.stroke(); });
        ctx.beginPath(); ctx.moveTo(lx+26,py); ctx.lineTo(lx+26,wy); ctx.stroke();
        ctx.setLineDash([]);
        // pill
        ctx.fillStyle='rgba(244,63,94,0.2)';
        ctx.beginPath(); ctx.roundRect(lx+30,mid-11,56,22,5); ctx.fill();
        ctx.fillStyle='#f43f5e';
        ctx.font='bold 11px Satoshi,sans-serif';
        ctx.fillText(`+${gap}pts`, lx+34, mid+4);
        ctx.restore();
      }
    }
  ]
});
</script>
</body>
</html>
